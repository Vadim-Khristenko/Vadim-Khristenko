# ─────────────────────────────────────────────────────────────────────────────
# stats.toml — hygiene rules for the rollup metrics. Optional file: delete it
# (or leave the lists empty) and nothing is excluded.
#
# exclude_repos
#   Repositories dropped from EVERY rollup metric: languages, estimated LOC,
#   stars, forks, open items, repo count, most-active and flagship lookups.
#   Names are matched like mirrors are deduped (case-insensitive, trailing
#   ".git" ignored), so one entry covers the same repo on every platform.
#   Note: platform-level contribution CALENDARS are account-wide and cannot be
#   split per repo — repo exclusion applies to everything derived from repo
#   lists and language bytes.
#
# exclude_commit_authors
#   Commit author identities (email, display name or login — case-insensitive)
#   filtered out of per-repo commit series (the flagship 30-day pulse and any
#   future commit bucketing), so CI auto-commits never count as activity.
# ─────────────────────────────────────────────────────────────────────────────

exclude_repos = [
  "Vadim-Khristenko",            # the profile repo — engine commits ≠ work
]

exclude_commit_authors = [
  "actions@git.vai-rice.space",  # Forgejo Actions bot (email)
  "VIA GIT",                     # Forgejo Actions bot (display name)
  "github-actions[bot]",         # GitHub Actions bot (login/name)
]
