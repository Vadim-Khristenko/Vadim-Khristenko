name: windows-runner-test

on:
  workflow_dispatch:
  push:
    paths:
      - '.forgejo/workflows/windows-runner-test.yml'

jobs:
  cross:
    name: cross-build a windows PE (light image)
    runs-on: windows-cross
    steps:
      - uses: actions/checkout@v4
      - name: toolchain present
        run: |
          x86_64-w64-mingw32-gcc --version | head -1
          cmake --version | head -1
      - name: build hello.exe
        run: |
          printf '#include <stdio.h>\nint main(void){ printf("built by windows-cross\n"); return 0; }\n' > hello.c
          x86_64-w64-mingw32-gcc hello.c -o hello.exe -static
          file hello.exe

  wine:
    name: build AND run the PE under wine
    runs-on: windows
    steps:
      - uses: actions/checkout@v4
      - name: wine present
        run: wine64 --version
      - name: build then execute
        run: |
          printf '#include <stdio.h>\nint main(void){ printf("ran under wine on the vaid runner\n"); return 0; }\n' > h.c
          x86_64-w64-mingw32-gcc h.c -o h.exe -static
          wine64 h.exe
