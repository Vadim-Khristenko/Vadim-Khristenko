name: Refresh Game Art

# Re-downloads uniform game cover art from SteamGridDB and commits it.
# Manual only — covers rarely change, so this is not on a schedule.
#
# Setup: add a repository secret named STEAMGRIDDB_API_KEY
#   (Settings → Secrets and variables → Actions → New repository secret).
#   Get a free key at steamgriddb.com → Preferences → API.
on:
  workflow_dispatch:
    inputs:
      only:
        description: "Comma-separated game keys to refresh (blank = all / use GAME_ONLY variable)"
        required: false
        default: ""

# Tip: set a repository Variable named GAME_ONLY to pin a default subset,
# e.g. "genshin,zzz". The manual input above overrides it when provided.

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            engine/target
          key: cargo-${{ hashFiles('engine/Cargo.lock') }}
          restore-keys: cargo-

      - name: Guard — key present?
        env:
          SGDB_KEY: ${{ secrets.STEAMGRIDDB_API_KEY }}
        run: |
          if [ -z "$SGDB_KEY" ]; then
            echo "::error::Missing STEAMGRIDDB_API_KEY secret. Add it in repo settings."
            exit 1
          fi

      - name: Build engine
        run: cargo build --release --manifest-path engine/Cargo.toml

      - name: Fetch covers
        env:
          SGDB_KEY: ${{ secrets.STEAMGRIDDB_API_KEY }}
          # manual input wins; otherwise fall back to the GAME_ONLY repo variable
          GAME_ONLY: ${{ inputs.only != '' && inputs.only || vars.GAME_ONLY }}
        run: ./engine/target/release/vai-profile art

      - name: Re-render the games card
        env:
          GH_TOKEN: ${{ secrets.PROFILE_TOKEN || secrets.GITHUB_TOKEN }}
        run: ./engine/target/release/vai-profile build --only games

      - name: Commit
        run: |
          git config user.name  "VIA GIT"
          git config user.email "actions@git.vai-rice.space"
          git add assets/games assets/games.svg
          if git diff --cached --quiet; then
            echo "No cover changes."
          else
            git commit -m "chore(profile): refresh game cover art [skip ci]"
            git push
          fi
