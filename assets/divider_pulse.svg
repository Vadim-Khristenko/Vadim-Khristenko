<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="58" viewBox="0 0 1000 58" role="img" aria-label="Section divider">
  <title>Section divider</title>
  <defs>
    <linearGradient id="trace_pl" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1a1b26" stop-opacity="0"/>
      <stop offset="0.2" stop-color="#dea584"/>
      <stop offset="0.5" stop-color="#bb9af7"/>
      <stop offset="0.8" stop-color="#7aa2f7"/>
      <stop offset="1" stop-color="#1a1b26" stop-opacity="0"/>
    </linearGradient>
    <filter id="dg_pl" x="-30%" y="-300%" width="160%" height="700%">
      <feGaussianBlur stdDeviation="1.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    
  </defs>
  
  <path d="M70,29 H440 L466,13 L492,47 L516,23 L540,29 H930" fill="none" stroke="url(#trace_pl)" stroke-width="1.6" filter="url(#dg_pl)"/>
  <path d="M70,29 H440 L466,13 L492,47 L516,23 L540,29 H930" fill="none" stroke="#f7768e" stroke-width="1.6" stroke-dasharray="26 900" opacity="0.9">
    <animate attributeName="stroke-dashoffset" values="926;0" dur="3.6s" repeatCount="indefinite"/>
  </path>
  <circle cx="500" cy="29" r="10" fill="none" stroke="#f7768e" stroke-width="1" opacity="0.35">
    <animate attributeName="r" values="6;14" dur="2.4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0" dur="2.4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="70" cy="29" r="2.6" fill="#dea584"/>
  <circle cx="930" cy="29" r="2.6" fill="#7aa2f7"/>
</svg>