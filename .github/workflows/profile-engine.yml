name: VAI Profile Engine (receiver)

# ─────────────────────────────────────────────────────────────────────────────
# FALLBACK pipeline. The PRIMARY regeneration runs on git.vai-rice.space
# (.forgejo/workflows/profile-engine.yml) and mirror-pushes here.
#
# This workflow exists so the profile can still be regenerated from GitHub if
# the Forgejo runner is down: manual dispatch only, same binary, commits as
# `VIA GIT`, and pushes ONLY to this repository — never to other hosts.
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: profile-engine
  cancel-in-progress: true

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            engine/target
          key: cargo-${{ hashFiles('engine/Cargo.lock') }}
          restore-keys: cargo-

      - name: Build engine
        run: cargo build --release --manifest-path engine/Cargo.toml

      - name: Run the engine (read-only provider tokens)
        env:
          # Default GITHUB_TOKEN covers public GitHub stats. PROFILE_TOKEN
          # (a PAT with read:user) additionally counts private contributions.
          GH_TOKEN: ${{ secrets.PROFILE_TOKEN || secrets.GITHUB_TOKEN }}
          VAI_GIT_TOKEN: ${{ secrets.VAI_GIT_TOKEN }}
          CODEBERG_TOKEN: ${{ secrets.CODEBERG_TOKEN }}
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
        run: ./engine/target/release/vai-profile build

      - name: Commit regenerated assets
        run: |
          git config user.name  "VIA GIT"
          git config user.email "actions@git.vai-rice.space"
          git add assets README.md
          if git diff --cached --quiet; then
            echo "Nothing changed — profile already fresh."
          else
            git commit -m "chore(profile): regenerate cards & live stats [skip ci]"
            git push
          fi
