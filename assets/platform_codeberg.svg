<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="140" viewBox="0 0 1000 140" role="img" aria-label="Platform stats for Codeberg — mirror node" font-family="'Segoe UI','Inter',system-ui,-apple-system,'Helvetica Neue',sans-serif">
  <title>Platform stats for Codeberg — mirror node</title>
  
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0" stop-color="#1f2335"/>
      <stop offset="1" stop-color="#15161e"/>
    </linearGradient>
    <linearGradient id="border" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2ac3de">
        <animate attributeName="stop-color" values="#2ac3de;#7aa2f7;#bb9af7;#7dcfff;#2ac3de" keyTimes="0;0.28;0.55;0.8;1" calcMode="spline" keySplines="0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1" dur="18s" repeatCount="indefinite"/>
      </stop>
      <stop offset="0.5" stop-color="#bb9af7">
        <animate attributeName="stop-color" values="#bb9af7;#7dcfff;#2ac3de;#7aa2f7;#bb9af7" keyTimes="0;0.28;0.55;0.8;1" calcMode="spline" keySplines="0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1" dur="18s" repeatCount="indefinite"/>
      </stop>
      <stop offset="1" stop-color="#7aa2f7">
        <animate attributeName="stop-color" values="#7aa2f7;#2ac3de;#7dcfff;#bb9af7;#7aa2f7" keyTimes="0;0.28;0.55;0.8;1" calcMode="spline" keySplines="0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1" dur="18s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <linearGradient id="accentbar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2ac3de"/>
      <stop offset="1" stop-color="#2ac3de" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="tophl" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M28 0 L0 0 0 28" fill="none" stroke="#565f89" stroke-width="0.5" opacity="0.08"/>
    </pattern>
  </defs>
  <rect x="2" y="2" width="996" height="136" rx="15" fill="url(#panel)"/>
  
  <rect x="2" y="2" width="996" height="24" rx="15" fill="url(#tophl)"/>
  <rect x="2.5" y="2.5" width="995" height="135" rx="14" fill="none" stroke="url(#border)" stroke-width="2"/>
  <rect x="3.5" y="3.5" width="993" height="133" rx="13" fill="none" stroke="#292e42" stroke-width="1" opacity="0.6"/>
  <path d="M2 18 Q2 2 18 2" fill="none" stroke="#2ac3de" stroke-width="2.4" opacity="0.9"/>
  <circle cx="24" cy="21" r="5.5" fill="#f7768e" opacity="0.92"/><circle cx="44" cy="21" r="5.5" fill="#e0af68" opacity="0.92"/><circle cx="64" cy="21" r="5.5" fill="#9ece6a" opacity="0.92"/>
  <text x="96" y="25" font-family="'JetBrains Mono','Cascadia Code','Fira Code','SFMono-Regular','Consolas','Liberation Mono',monospace" font-size="13" fill="#a9b1d6">~/platforms/codeberg.host</text>
  <circle cx="975" cy="21" r="3.5" fill="#2ac3de"><animate attributeName="opacity" values="1;0.4;1" dur="2.6s" repeatCount="indefinite"/></circle><text x="964" y="25" text-anchor="end" font-family="'JetBrains Mono','Cascadia Code','Fira Code','SFMono-Regular','Consolas','Liberation Mono',monospace" font-size="12" fill="#9aa5ce">@VAI_PROG</text>
  <rect x="24" y="42" width="952" height="2" fill="url(#accentbar)"/>
  <g transform="translate(0,42)">
    
    <text x="24" y="48" font-family="'JetBrains Mono','Cascadia Code','Fira Code','SFMono-Regular','Consolas','Liberation Mono',monospace" font-size="22" font-weight="800" fill="#2ac3de">Codeberg</text>
    <rect x="149" y="30" width="102" height="22" rx="11" fill="#292e42" stroke="#2ac3de" stroke-width="0.9"/>
    <text x="200" y="45" text-anchor="middle" font-family="'JetBrains Mono','Cascadia Code','Fira Code','SFMono-Regular','Consolas','Liberation Mono',monospace" font-size="11" fill="#2ac3de">mirror node</text>
    <text x="24" y="76" font-family="'Segoe UI','Inter',system-ui,-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#a9b1d6">Mirrors of the source tree — code counted once, stars counted here too.</text>
    <text x="560" y="52" font-family="'JetBrains Mono','Cascadia Code','Fira Code','SFMono-Regular','Consolas','Liberation Mono',monospace" font-size="24" font-weight="800" fill="#2ac3de">3</text><text x="560" y="72" font-family="'JetBrains Mono','Cascadia Code','Fira Code','SFMono-Regular','Consolas','Liberation Mono',monospace" font-size="10.5" fill="#9aa5ce">repos</text><text x="666" y="52" font-family="'JetBrains Mono','Cascadia Code','Fira Code','SFMono-Regular','Consolas','Liberation Mono',monospace" font-size="24" font-weight="800" fill="#e0af68">16</text><text x="666" y="72" font-family="'JetBrains Mono','Cascadia Code','Fira Code','SFMono-Regular','Consolas','Liberation Mono',monospace" font-size="10.5" fill="#9aa5ce">stars</text><text x="772" y="52" font-family="'JetBrains Mono','Cascadia Code','Fira Code','SFMono-Regular','Consolas','Liberation Mono',monospace" font-size="24" font-weight="800" fill="#7aa2f7">2</text><text x="772" y="72" font-family="'JetBrains Mono','Cascadia Code','Fira Code','SFMono-Regular','Consolas','Liberation Mono',monospace" font-size="10.5" fill="#9aa5ce">forks</text><text x="878" y="52" font-family="'JetBrains Mono','Cascadia Code','Fira Code','SFMono-Regular','Consolas','Liberation Mono',monospace" font-size="24" font-weight="800" fill="#f7768e">3</text><text x="878" y="72" font-family="'JetBrains Mono','Cascadia Code','Fira Code','SFMono-Regular','Consolas','Liberation Mono',monospace" font-size="10.5" fill="#9aa5ce">open items</text>
  </g>
</svg>