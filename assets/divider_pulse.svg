<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="64" viewBox="0 0 1000 64" role="img" aria-label="Section divider: terminal readout">
  <title>Section divider: terminal readout</title>
  <defs>
    <linearGradient id="panel_pl" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1f2335"/>
      <stop offset="1" stop-color="#15161e"/>
    </linearGradient>
    <linearGradient id="trace_pl" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#dea584"/>
      <stop offset="0.5" stop-color="#bb9af7"/>
      <stop offset="1" stop-color="#7aa2f7"/>
    </linearGradient>
    <filter id="dg_pl" x="-30%" y="-300%" width="160%" height="700%">
      <feGaussianBlur stdDeviation="1.4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    
  </defs>
  <rect x="8" y="4" width="984" height="56" rx="10" fill="url(#panel_pl)"/>
  <rect x="8.5" y="4.5" width="983" height="55" rx="9.5" fill="none" stroke="#292e42" stroke-width="1"/>
  <path d="M8 16 Q8 4 20 4" fill="none" stroke="#dea584" stroke-width="2" opacity="0.85"/>
  
  <text x="30" y="27" font-family="'JetBrains Mono','Cascadia Code','Fira Code','SFMono-Regular','Consolas','Liberation Mono',monospace" font-size="12" fill="#9ece6a">vai@fleet:~$</text>
  <text x="138" y="27" font-family="'JetBrains Mono','Cascadia Code','Fira Code','SFMono-Regular','Consolas','Liberation Mono',monospace" font-size="12" fill="#c0caf5">cargo watch -x &#x27;run --release&#x27;</text>
  <rect x="368" y="17" width="7" height="13" fill="#c0caf5"><animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.5;0.5;1" dur="1.2s" repeatCount="indefinite"/></rect>
  <text x="30" y="49" font-family="'JetBrains Mono','Cascadia Code','Fira Code','SFMono-Regular','Consolas','Liberation Mono',monospace" font-size="11" fill="#9aa5ce">[engine] 11 cards re-rendered · 0 warnings · fleet green</text>
  <text x="560" y="22" font-family="'JetBrains Mono','Cascadia Code','Fira Code','SFMono-Regular','Consolas','Liberation Mono',monospace" font-size="10" fill="#565f89" letter-spacing="2">UPTIME MONITOR</text>
  <text x="970" y="22" text-anchor="end" font-family="'JetBrains Mono','Cascadia Code','Fira Code','SFMono-Regular','Consolas','Liberation Mono',monospace" font-size="10.5" fill="#9ece6a">● 200 OK · 12 ms</text>
  <path d="M560,40 H680 L704,27 L730,54 L754,35 L778,40 H970" fill="none" stroke="url(#trace_pl)" stroke-width="1.5" filter="url(#dg_pl)"/>
  <path d="M560,40 H680 L704,27 L730,54 L754,35 L778,40 H970" fill="none" stroke="#f7768e" stroke-width="1.6" stroke-dasharray="26 900" opacity="0.9">
    <animate attributeName="stroke-dashoffset" values="926;0" dur="3.6s" repeatCount="indefinite"/>
  </path>
  <circle cx="740" cy="40" r="9" fill="none" stroke="#f7768e" stroke-width="1" opacity="0.35">
    <animate attributeName="r" values="5;13" dur="2.4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0" dur="2.4s" repeatCount="indefinite"/>
  </circle>
</svg>