<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="104" viewBox="0 0 1000 104" role="img" font-family="'Segoe UI','Inter',system-ui,-apple-system,'Helvetica Neue',sans-serif">
  
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0" stop-color="#1f2335"/>
      <stop offset="1" stop-color="#15161e"/>
    </linearGradient>
    <linearGradient id="border" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#9ece6a">
        <animate attributeName="stop-color" values="#9ece6a;#7aa2f7;#bb9af7;#7dcfff;#9ece6a" dur="12s" repeatCount="indefinite"/>
      </stop>
      <stop offset="0.5" stop-color="#bb9af7">
        <animate attributeName="stop-color" values="#bb9af7;#7dcfff;#9ece6a;#7aa2f7;#bb9af7" dur="12s" repeatCount="indefinite"/>
      </stop>
      <stop offset="1" stop-color="#7aa2f7">
        <animate attributeName="stop-color" values="#7aa2f7;#9ece6a;#7dcfff;#bb9af7;#7aa2f7" dur="12s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <linearGradient id="accentbar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#9ece6a"/>
      <stop offset="1" stop-color="#9ece6a" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M28 0 L0 0 0 28" fill="none" stroke="#565f89" stroke-width="0.5" opacity="0.08"/>
    </pattern>
  </defs>
