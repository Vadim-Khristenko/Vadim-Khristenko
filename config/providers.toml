# ─────────────────────────────────────────────────────────────────────────────
# providers.toml — every platform the engine aggregates.
#
# kind = "github"  → api.github.com (REST + GraphQL + calendar scrape)
# kind = "forgejo" → any Gitea-compatible /api/v1 host (Codeberg, self-hosted…)
#
# token_env names an environment variable holding a READ-ONLY API token.
# A missing token degrades to tokenless public reads; an unreachable host is
# logged and skipped — never fatal. Adding a platform = one more entry here.
# ─────────────────────────────────────────────────────────────────────────────

[[provider]]
id = "vai-git"                 # source of truth
kind = "forgejo"
display = "VAI Git"
base_url = "https://git.vai-rice.space"
user = "VAI_PROG"
token_env = "VAI_GIT_TOKEN"
primary = true

[[provider]]
id = "github"
kind = "github"
display = "GitHub"
user = "Vadim-Khristenko"
token_env = "GH_TOKEN"

[[provider]]
id = "codeberg"
kind = "forgejo"
display = "Codeberg"
base_url = "https://codeberg.org"
user = "VAI_PROG"
token_env = "CODEBERG_TOKEN"
